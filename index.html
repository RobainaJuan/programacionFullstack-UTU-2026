<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Programación Fullstack - UTU 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        p {
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .contenedor {
            max-width: 900px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            color: #333;
            padding: 25px;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: block;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        .footer {
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.8;
        }

        /* Responsive extra */
        @media (max-width: 500px) {
            h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <h1>💻 Programación Fullstack</h1>
        <p>Repositorio de ejercicios - UTU 2026</p>

        <div class="grid">
            <a class="card" href="MARZO/index.html" target="_blank">
                <h2>📅 Marzo</h2>
                <p>Ver trabajos prácticos</p>
            </a>

            <a class="card" href="ABRIL/index.html" target="_blank">
                <h2>📅 Abril</h2>
                <p>Ver trabajos prácticos</p>
            </a>
        </div>

        <div class="footer">
            <p>Hecho por Juan Robaina</p>
        </div>
    </div>

</body>
</html>
