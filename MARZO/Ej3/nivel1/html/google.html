<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google - Estructura Semántica</title>
</head>
<body>
  <header>
    <a href="">
      <img src="logo-google.png" alt="Google" width="272" height="92" />
    </a>
    <nav>
      <ul>
        <li><a href="">Gmail</a></li>
        <li><a href="">Imágenes</a></li>
        <li><a href="">Iniciar sesión</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section>
      <h1>Buscar en Google</h1>
      <form action="" method="get" role="search">
        <label for="busqueda" class="visually-hidden">Buscar</label>
        <input
          type="search"
          id="busqueda"
          name="q"
          placeholder="Busca en Google o escribe una URL"
          aria-label="Barra de búsqueda"
        />
        <button type="submit">Buscar con Google</button>
        <button type="button">Voy a tener suerte</button>
      </form>
    </section>
    <section>
      <p>Ofrecido por Google en: <a href="">Español</a></p>
    </section>
  </main>
  <footer>
    <nav>
      <ul>
        <li><a href="">Publicidad</a></li>
        <li><a href="">Negocios</a></li>
        <li><a href="">Cómo funciona la Búsqueda</a></li>
        <li><a href="">Privacidad</a></li>
        <li><a href="">Condiciones</a></li>
        <li><a href="">Configuración</a></li>
      </ul>
    </nav>
  </footer>

</body>
</html>
