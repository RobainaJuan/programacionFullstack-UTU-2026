<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Botones</title>
</head>
<body>

    <div class="contenedor">
        <button class="boton aceptar">
            Aceptar
            <div class="icono">✓</div>
        </button>

        <button class="boton cancelar">
            Cancelar
            <div class="icono">✖</div>
        </button>

        <button class="boton eliminar">
            Eliminar
            <div class="icono">✖</div>
        </button>
    </div>
</body>
</html>
