<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Programación Fullstack - UTU 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .contenedor {
            max-width: 800px;
            margin: auto;
        }

        /* BOTÓN VOLVER */
        .btn-volver {
            display: inline-block;
            margin-bottom: 25px;
            padding: 10px 18px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-volver:hover {
            background: #ddd;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="contenedor">
        <h1>💻 Programación Fullstack</h1>
        <p>Repositorio de ejercicios - UTU 2026</p>
        <a href="../index.html" class="btn-volver">⬅ Volver</a>

        <div class="grid">
            <a class="card" href="Lvl1/index.html" target="_blank">
                <h2>Lvl1</h2>
                <p>Ver trabajo práctico</p>
            </a>
            <a class="card" href="Lvl2/index.html" target="_blank">
                <h2>Lvl2</h2>
                <p>Ver trabajo práctico</p>
            </a>
            <a class="card" href="Lvl3/index.html" target="_blank">
                <h2>Lvl3</h2>
                <p>Ver trabajo práctico</p>
            </a>
        </div>

        <div class="footer">
            <p>Hecho por Juan Robaina</p>
        </div>
    </div>

</body>
</html>
